<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="HTML, CSS, Bootstrap, JavaScript">
    <meta name="description" content="A Library Page">
    <meta name="author" content="Ana Clarissi">

    <link rel="shortcut icon" href="src/assets/icons/logo.ico" type="image/x-icon">

    <title>Project - Library</title>

    <!-- BARLOW & POPPINS FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <!-- BOOTSTRAP ICON -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- BOOTSTRAP CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- STYLE CSS -->
    <link rel="stylesheet" href="src/css/style.css">

</head>
<body>

    <div id="container">

        <header class="container-fluid" id="header">

            <div class="container-sm container-lg">

                <div class="logo">

                    <img src="src/assets/images/logo.png" alt="Logo" id="logo-img">

                    <h1>Library</h1>

                </div>

            </div>

        </header>

        <main id="main">

            <div class="container-sm container-lg">

                <div class="books">

                    <div class="card">

                        <div class="book-image">

                            <i class="bi bi-book-half book"></i>

                        </div>

                        <h2 class="book-title">A Hora da Estrela</h2>

                        <h3 class="book-author">Clerice Lispector</h3>

                        <p class="pages">87 pages</p>

                        <div class="card-actions">

                            <button class="btn btn-read">

                                <span>Read</span>

                                <i class="bi bi-bookmark-check"></i>

                            </button>

                            <button class="btn btn-remove">

                                <span>Remove</span>

                                <i class="bi bi-trash"></i>

                            </button>

                        </div>


                    </div>

                </div>

            </div>

            <button class="btn btn-add" type="button">

                <span>Add book</span>

                <i class="bi bi-plus-circle"></i>

            </button>

        </main>

    </div>

    <div class="modal">

        <form>

            <div class="form-logo">

                <img src="src/assets/images/logo.png" alt="Logo">

                <span>Add Book</span>

            </div>

            <div class="form-body">

                <div class="input-row">

                    <label for="in-title">Title</label>

                    <input type="text" name="in-title" id="in-title" required>

                </div>

                <div class="input-row">

                    <label for="in-author">Author</label>

                    <input type="text" name="in-author" id="in-author" required>

                </div>

                <div class="input-row">

                    <label for="in-pages">Pages</label>

                    <input type="text" name="in-pages" id="in-pages" required>

                </div>

                <div class="input-row last">

                    <label for="in-read">Have you read it?</label>
                    
                    <input type="checkbox" name="in-read" id="in-read">

                </div>

            </div>

            <div class="form-actions">

                <button class="btn btn-cancel" type="button">Cancel</button>

                <button class="btn btn-form-add" type="submit">Add Book</button>

            </div>

        </form>

    </div>

    <!-- BOOTSTRAP JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <!-- SCRIPT JS -->
    <script src="src/js/script.js"></script>

    <!-- MODAL JS -->
    <script src="src/js/modal.js"></script>

</body>
</html>
